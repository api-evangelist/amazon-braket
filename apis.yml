        url: https://aws.amazon.com/contact-us/
    features:
      - name: Quantum Task Execution
        description: >-
          Submit quantum circuits to QPU devices or simulators as quantum
          tasks, with results stored in Amazon S3.
      - name: Hybrid Jobs
        description: >-
          Run hybrid quantum-classical algorithms with managed classical
          compute resources and priority QPU access.
      - name: Device Discovery
        description: >-
          Search and retrieve details about available quantum devices including
          QPUs from multiple providers and simulators.
      - name: Multiple QPU Providers
        description: >-
          Access quantum hardware from IonQ, Rigetti, QuEra, Oxford Quantum
          Circuits, IQM, and other providers through a unified API.
      - name: Quantum Simulators
        description: >-
          Use high-performance local and managed simulators (SV1, DM1, TN1)
          for circuit testing before running on QPUs.
      - name: Spending Limits
        description: >-
          Create and manage spending limits to control QPU and simulator
          usage costs at the account level.
      - name: Pulse Control
        description: >-
          Access native gate-level pulse control for advanced quantum
          hardware calibration and experimentation.
    useCases:
      - name: Quantum Algorithm Research
        description: >-
          Develop and test quantum algorithms on simulators before running
          on QPU hardware across multiple providers.
      - name: Quantum Machine Learning
        description: >-
          Run quantum-classical hybrid ML algorithms combining quantum circuits
          with classical optimization using Braket Hybrid Jobs.
      - name: Quantum Chemistry Simulation
        description: >-
          Simulate molecular interactions and chemical reactions using
          variational quantum eigensolvers (VQE) on QPU hardware.
      - name: Quantum Optimization
        description: >-
          Solve combinatorial optimization problems using QAOA and other
          quantum optimization algorithms on available QPUs.
    integrations:
      - name: Amazon S3
        description: Store quantum task results and job artifacts in Amazon S3
      - name: Amazon CloudWatch
        description: Monitor quantum job metrics and logs in CloudWatch
      - name: AWS IAM
        description: Control access to Braket resources with IAM policies
      - name: Amazon ECR
        description: Store custom container images for Braket Hybrid Jobs
      - name: Amazon SageMaker
        description: Integrate quantum algorithms with SageMaker ML workflows
    solutions:
      - name: Quantum Research Platform
        description: >-
          Build a comprehensive quantum research platform with access to
          multiple QPU providers, simulators, and managed job infrastructure.
