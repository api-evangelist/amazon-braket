aid: amazon-braket
name: Amazon Braket
description: >-
  Amazon Braket is a fully managed quantum computing service that helps
  researchers and developers explore and build quantum algorithms, test them
  on quantum circuit simulators, and run them on different quantum hardware
  technologies. Braket provides access to multiple quantum processors from
  IonQ, Rigetti, QuEra, Oxford Quantum Circuits, and IQM, as well as
  high-performance quantum circuit simulators. It supports hybrid
  quantum-classical algorithms through Braket Hybrid Jobs.
type: Index
